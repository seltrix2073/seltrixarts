<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seltrix Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat', sans-serif;
background:white;
color:black;
}

/* HEADER */

header{
display:flex;
align-items:center;
padding:15px 25px;
background:black;
}

.logo{
font-family:'Cinzel', serif;
font-size:28px;
letter-spacing:4px;
margin-left:15px;
color:white;
}

/* HAMBURGER */

.menu-btn{
width:30px;
cursor:pointer;
}

.menu-btn span{
display:block;
height:3px;
background:white;
margin:6px 0;
transition:0.4s;
}

.menu-btn.active span:nth-child(1){
transform:rotate(45deg) translate(6px,6px);
}

.menu-btn.active span:nth-child(2){
opacity:0;
}

.menu-btn.active span:nth-child(3){
transform:rotate(-45deg) translate(7px,-7px);
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:white;
border-right:1px solid #eee;
padding-top:80px;
transition:0.4s;
}

.sidebar a{
display:block;
padding:18px 30px;
text-decoration:none;
color:black;
font-size:18px;
}

.sidebar a:hover{
background:#f5f5f5;
}

/* GALLERY */

.gallery{
max-width:1000px;
margin:auto;
padding:60px 20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:8px;
transition:0.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:800px){

.gallery{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:500px){

.gallery{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<a href="index.html">Home</a>
<a href="gallery.html">Gallery</a>
<a href="order.html">Order</a>
<a href="offer.html">Offers</a>

</div>

<!-- HEADER -->

<header>

<div class="menu-btn" id="menuBtn">
<span></span>
<span></span>
<span></span>
</div>

<div class="logo">SELTRIX</div>

</header>

<!-- GALLERY -->

<section class="gallery">

<img src="1.png">
<img src="2.png">
<img src="3.png">
<img src="4.jpeg">
<img src="5.jpeg">
<img src="6.jpeg">

</section>

<script>

const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");

menuBtn.onclick = function(){

menuBtn.classList.toggle("active");

if(sidebar.style.left === "0px"){
sidebar.style.left = "-260px";
}
else{
sidebar.style.left = "0px";
}

}

</script>

</body>
</html>
