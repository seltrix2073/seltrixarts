<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order | Seltrix</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat', sans-serif;
background:white;
color:black;
}

/* HEADER */

header{
display:flex;
align-items:center;
padding:15px 25px;
background:black;
color:white;
}

.logo{
font-family:'Cinzel', serif;
font-size:26px;
letter-spacing:4px;
margin-left:15px;
}

/* HAMBURGER */

.menu-btn{
width:30px;
cursor:pointer;
}

.menu-btn span{
display:block;
height:3px;
background:white;
margin:6px 0;
transition:0.4s;
}

.menu-btn.active span:nth-child(1){
transform:rotate(45deg) translate(6px,6px);
}

.menu-btn.active span:nth-child(2){
opacity:0;
}

.menu-btn.active span:nth-child(3){
transform:rotate(-45deg) translate(7px,-7px);
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:white;
border-right:1px solid #eee;
padding-top:80px;
transition:0.4s;
}

.sidebar a{
display:block;
padding:18px 30px;
text-decoration:none;
color:black;
font-size:18px;
}

.sidebar a:hover{
background:#f5f5f5;
}

/* ORDER SECTION */

.order-section{
max-width:600px;
margin:80px auto;
padding:20px;
}

.order-section h2{
text-align:center;
margin-bottom:30px;
font-weight:300;
}

form{
display:flex;
flex-direction:column;
gap:20px;
}

/* INPUTS */

input, textarea{
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
font-family:'Montserrat', sans-serif;
}

textarea{
min-height:120px;
resize:vertical;
}

/* FILE UPLOAD */

.file-upload{
border:2px dashed #bbb;
padding:30px;
text-align:center;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.file-upload:hover{
border-color:black;
background:#f9f9f9;
}

.file-upload input{
display:none;
}

/* BUTTON */

button{
padding:14px;
border:none;
background:black;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
border-radius:6px;
}

button:hover{
background:#333;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<a href="index.html">Home</a>
<a href="gallery.html">Gallery</a>
<a href="order.html">Order</a>
<a href="offer.html">Offers</a>

</div>

<!-- HEADER -->

<header>

<div class="menu-btn" id="menuBtn">
<span></span>
<span></span>
<span></span>
</div>

<div class="logo">SELTRIX</div>

</header>

<!-- ORDER FORM -->

<section class="order-section">

<h2>Request a Custom Artwork</h2>

<form action="https://formspree.io/f/mlgpplal" method="POST" enctype="multipart/form-data">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="description" placeholder="Describe your artwork idea (style, character, colors, mood, etc.)" required></textarea>

<label class="file-upload">
Upload reference image
<input type="file" name="reference">
</label>

<button type="submit">Submit Order</button>

</form>

</section>

<script>

const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");

menuBtn.onclick = function(){

menuBtn.classList.toggle("active");

if(sidebar.style.left === "0px"){
sidebar.style.left = "-260px";
}
else{
sidebar.style.left = "0px";
}

}

</script>

</body>
</html>
